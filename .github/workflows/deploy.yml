name: Manual Deploy to Railway

on:
  push:
    branches:
      - main  # វានឹងរត់រាល់ពេលអ្នក push ទៅ main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Dependencies
        run: |
          cd backend
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      # បន្ថែមការ Test កូដនៅទីនេះ (ប្រសិនបើមាន)
      # - name: Run Tests
      #   run: php artisan test

  deploy-signal:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Signal Railway to Deploy
        run: echo "Build and Test successful. Signaling Railway..."
